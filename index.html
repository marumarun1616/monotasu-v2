<div style="max-width:700px;margin:0 auto;padding:20px 16px 48px;">
  <div id="formCard" style="background:white;border-radius:3px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.1);">
    <div style="background:#CC0000;padding:14px 20px;">
      <div style="font-size:16px;font-weight:700;color:white;">一式を確認する</div>
      <div style="font-size:12px;color:rgba(255,255,255,.8);margin-top:3px;">目的と手持ちの商品を入力すると、現場で止まらない一式をAIが提示します</div>
    </div>
    <div style="padding:24px;">
      <div style="margin-bottom:18px;">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:7px;">
          <label style="font-size:13px;font-weight:700;color:#222;">目的・やりたいこと</label>
          <span style="font-size:10px;background:#CC0000;color:white;padding:1px 6px;border-radius:2px;">必須</span>
        </div>
        <input id="goal" type="text" placeholder="例：ドローンの試作機を組み立てたい"
          style="width:100%;padding:10px 12px;border:1px solid #BBB;border-radius:2px;font-size:14px;outline:none;" />
      </div>
      <div style="margin-bottom:22px;">
        <label style="display:block;font-size:13px;font-weight:700;color:#222;margin-bottom:7px;">
          手持ちの商品
          <span style="font-size:11px;color:#999;font-weight:400;margin-left:6px;">複数はカンマ区切り</span>
        </label>
        <input id="items" type="text" placeholder="例：フレームキット、ESC"
          style="width:100%;padding:10px 12px;border:1px solid #BBB;border-radius:2px;font-size:14px;outline:none;" />
      </div>
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
        <button id="submitBtn" onclick="doSubmit()"
          style="background:#CC0000;color:white;border:none;padding:11px 28px;font-size:14px;font-weight:700;border-radius:2px;">
          一式を確認する →
        </button>
        <div id="loadingDiv" style="display:none;align-items:center;gap:8px;">
          <div class="spinner"></div>
          <span id="loadingMsg" style="font-size:12px;color:#888;"></span>
        </div>
      </div>
      <div id="errorDiv" style="display:none;margin-top:14px;padding:10px 14px;background:#FFF0F0;border:1px solid #FFBBBB;border-radius:2px;font-size:13px;color:#CC0000;"></div>
      <div style="margin-top:20px;padding-top:16px;border-top:1px solid #EEE;">
        <div style="font-size:12px;color:#AAA;margin-bottom:8px;">使用例</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px;">
          <button onclick="fill('ドローンの試作機を組み立てたい','フレームキット、ESC')" style="font-size:12px;background:#F5F5F5;border:1px solid #DDD;padding:5px 12px;border-radius:2px;color:#0066CC;">ドローン試作</button>
          <button onclick="fill('ショートドラマ撮影で長時間録音をしたい','Zoom F8n Pro')" style="font-size:12px;background:#F5F5F5;border:1px solid #DDD;padding:5px 12px;border-radius:2px;color:#0066CC;">録音機材セット</button>
          <button onclick="fill('電気工事で壁コンセントを設置したい','電線 VVF 2mm')" style="font-size:12px;background:#F5F5F5;border:1px solid #DDD;padding:5px 12px;border-radius:2px;color:#0066CC;">電気工事</button>
          <button onclick="fill('自動車のオイル交換をしたい','エンジンオイル 5W-30')" style="font-size:12px;background:#F5F5F5;border:1px solid #DDD;padding:5px 12px;border-radius:2px;color:#0066CC;">自動車整備</button>
        </div>
      </div>
    </div>
  </div>
  <div id="result" style="display:none;"></div>
</div>

<script>
const MSGS=["レビューを参照しています...","必要なパーツを確認しています...","規格・互換性を照合しています...","注意点をまとめています..."];
let msgTimer;

function fill(g,i){document.getElementById("goal").value=g;document.getElementById("items").value=i;}

function startLoading(){
  let i=0;document.getElementById("loadingMsg").textContent=MSGS[0];
  document.getElementById("loadingDiv").style.display="flex";
  msgTimer=setInterval(()=>{i=(i+1)%MSGS.length;document.getElementById("loadingMsg").textContent=MSGS[i];},1800);
}
function stopLoading(){clearInterval(msgTimer);document.getElementById("loadingDiv").style.display="none";}

function pb(p){
  const bg=p==="必須"?"#CC0000":p==="推奨"?"#FF6600":"#E0E0E0",c=p==="あると便利"?"#666":"white";
  return `<span style="font-size:11px;padding:2px 8px;border-radius:2px;font-weight:700;background:${bg};color:${c};">${p}</span>`;
}
function mb(m){
  const bg=m==="あり"?"#E8F5E9":m==="要確認"?"#FFF8E1":"#F5F5F5";
  const c=m==="あり"?"#2E7D32":m==="要確認"?"#E65100":"#999";
  const b=m==="あり"?"1px solid #A5D6A7":m==="要確認"?"1px solid #FFCC80":"1px solid #DDD";
  return `<span style="font-size:11px;padding:2px 8px;border-radius:2px;background:${bg};color:${c};border:${b};">モノタロウ ${m}</span>`;
}

function renderResult(d){
  const parts=(d.parts||[]).map((p,i)=>
    `<div style="padding:14px 18px;border-bottom:1px solid #F0F0F0;display:flex;gap:12px;">
      <span style="font-size:11px;color:#CCC;flex-shrink:0;margin-top:4px;min-width:22px;font-weight:700;">${String(i+1).padStart(2,"0")}</span>
      <div style="flex:1;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;">
          <span style="font-size:14px;font-weight:700;color:#0066CC;">${p.name}</span>
          ${pb(p.priority)} ${mb(p.monotaro)}
        </div>
        <div style="font-size:13px;color:#555;line-height:1.7;">${p.reason}</div>
      </div>
    </div>`).join("");

  const warnings=(d.warnings||[]).map(w=>
    `<div style="padding:12px 18px;border-bottom:1px solid #F5F5F5;display:flex;gap:10px;">
      <span style="font-size:11px;font-weight:700;color:#E65100;background:#FFF3E0;border:1px solid #FFE0B2;padding:2px 7px;border-radius:2px;flex-shrink:0;margin-top:2px;">注意</span>
      <span style="font-size:13px;color:#333;line-height:1.7;">${w}</span>
    </div>`).join("");

  const reviews=(d.reviews||[]).map(r=>
    `<div style="padding:14px 18px;border-bottom:1px solid #F5F5F5;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
        <span style="color:#FF6600;font-size:15px;">${"★".repeat(r.stars)}${"☆".repeat(5-r.stars)}</span>
        <span style="font-size:13px;font-weight:700;color:#FF6600;">${r.stars}.0</span>
        <span style="font-size:11px;color:#888;background:#F5F5F5;padding:2px 8px;border-radius:2px;">${r.meta}</span>
      </div>
      <div style="font-size:13px;color:#333;line-height:1.75;">${r.text}</div>
    </div>`).join("");

  document.getElementById("result").innerHTML=`
    <div style="background:white;border-left:4px solid #CC0000;border-radius:3px;padding:16px 20px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.08);">
      <div style="font-size:17px;font-weight:700;margin-bottom:6px;color:#111;">${d.title}</div>
      <div style="font-size:13px;color:#555;line-height:1.75;">${d.summary}</div>
    </div>
    <div style="background:white;border-radius:3px;overflow:hidden;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.08);">
      <div style="padding:11px 18px;background:#F7F7F7;border-bottom:1px solid #E8E8E8;display:flex;align-items:center;gap:8px;">
        <span style="font-size:14px;font-weight:700;color:#111;">必要な一式</span>
        <span style="font-size:12px;color:#AAA;">${(d.parts||[]).length}点</span>
      </div>${parts}
    </div>
    <div style="background:white;border-radius:3px;overflow:hidden;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.08);">
      <div style="padding:11px 18px;background:#F7F7F7;border-bottom:1px solid #E8E8E8;font-size:14px;font-weight:700;color:#111;">現場で止まる前に知っておくこと</div>${warnings}
    </div>
    <div style="background:white;border-radius:3px;overflow:hidden;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.08);">
      <div style="padding:11px 18px;background:#F7F7F7;border-bottom:1px solid #E8E8E8;font-size:14px;font-weight:700;color:#111;">モノタロウ レビューより</div>${reviews}
    </div>
    <div style="background:white;border-radius:3px;padding:16px 20px;box-shadow:0 1px 3px rgba(0,0,0,.08);display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;">
      <div>
        <div style="font-size:14px;font-weight:700;margin-bottom:3px;">「${d.title}」をモノタロウで揃える</div>
        <div style="font-size:12px;color:#AAA;">2,888万点の品揃え ／ 翌日配送対応</div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button onclick="window.open('https://www.monotaro.com/s/?c=&q='+encodeURIComponent('${d.title}'),'_blank')"
          style="background:#FF6600;color:white;border:none;padding:10px 22px;font-size:14px;font-weight:700;border-radius:2px;">
          モノタロウで探す →
        </button>
        <button onclick="resetForm()"
          style="background:none;border:1px solid #CCC;padding:9px 16px;font-size:13px;color:#555;border-radius:2px;">
          もう一度入力する
        </button>
      </div>
    </div>`;

  document.getElementById("result").style.display="block";
  document.getElementById("formCard").style.display="none";
  document.getElementById("result").scrollIntoView({behavior:"smooth",block:"start"});
}

function resetForm(){
  document.getElementById("result").style.display="none";
  document.getElementById("result").innerHTML="";
  document.getElementById("formCard").style.display="block";
  document.getElementById("goal").value="";
  document.getElementById("items").value="";
  window.scrollTo({top:0,behavior:"smooth"});
}

async function doSubmit(){
  const goal=document.getElementById("goal").value.trim();
  const items=document.getElementById("items").value.trim();
  if(!goal) return;
  document.getElementById("submitBtn").disabled=true;
  document.getElementById("errorDiv").style.display="none";
  startLoading();
  try{
    const res=await fetch("/api/ask",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({goal,items})
    });
    const text=await res.text();
    let data;
    try{data=JSON.parse(text);}catch(e){throw new Error("サーバーエラー: "+text.slice(0,80));}
    if(data.error) throw new Error(data.error);
    renderResult(data);
  }catch(e){
    document.getElementById("errorDiv").textContent="エラー: "+e.message;
    document.getElementById("errorDiv").style.display="block";
  }finally{
    stopLoading();
    document.getElementById("submitBtn").disabled=false;
  }
}

document.getElementById("goal").addEventListener("keydown",e=>{if(e.key==="Enter")doSubmit();});
document.getElementById("items").addEventListener("keydown",e=>{if(e.key==="Enter")doSubmit();});
</script>
</body>
</html>
